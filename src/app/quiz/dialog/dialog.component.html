<div>
  <h2 mat-dialog-title class="text-center">{{ data.title }}</h2>
  <div mat-dialog-content>
    Your score is: {{ data.score }}. Do you want to save your result?
  </div>

  <div mat-dialog-actions align="end">
    <button mat-raised-button mat-dialog-close color="warn" (click)="cancel()">
      {{ data.action_no }}
    </button>
    <button
      *ngIf="data.action === 'create' || data.action === 'create'"
      mat-raised-button
      color="primary"
      (click)="submit()"
    >
      {{ data.action_yes }}
    </button>
  </div>
</div>
