<div>
  <h2 mat-dialog-title class="text-center">{{ data.title }}</h2>
  <div mat-dialog-content>
    Your previous score is: {{ data.score }}.
    <form [formGroup]="dialogForm" *ngIf="data.action !== 'import'">
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>Enter username</mat-label>
        <input matInput formControlName="username" />
        <mat-error
          *ngIf="
            dialogForm.get('username')?.touched &&
            dialogForm.get('username')?.errors
          "
        >
          This field is required.
        </mat-error>
      </mat-form-field>
    </form>
  </div>

  <div mat-dialog-actions align="end">
    <button mat-raised-button mat-dialog-close color="warn" (click)="cancel()">
      {{ data.action_no }}
    </button>
    <button
      *ngIf="data.action === 'create' || data.action === 'create'"
      mat-raised-button
      color="primary"
      (click)="submit()"
    >
      {{ data.action_yes }}
    </button>
  </div>
</div>
